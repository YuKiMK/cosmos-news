name: Cosmos News Daily Update

on:
  schedule:
    - cron: '30 19 * * *'  # 毎日 04:30 JST (= 19:30 UTC)
  workflow_dispatch:        # GitHub画面から手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install feedparser anthropic

      - name: Update morning articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_news.py --edition morning

      - name: Update evening articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_news.py --edition evening

      - name: Commit and push updated HTML
        run: |
          git config user.name "Cosmos Bot"
          git config user.email "cosmos-bot@users.noreply.github.com"
          git add 科学情報.html
          git diff --staged --quiet || git commit -m "Daily update: $(date +'%Y-%m-%d')"
          git push
